name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (db.js)
        run: npm run test:unit

      - name: Validate JavaScript syntax
        run: |
          node --check main.js
          node --check preload.js
          node --check preload-notification.js
          node --check script.js
          node --check scripts/build-icon.js
          node --check scripts/clean-dist.js
          node --check scripts/validate-config.js

      - name: Build icon assets
        run: node scripts/build-icon.js

  e2e:
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    uses: ./.github/workflows/e2e-playwright.yml
    secrets: inherit
    with:
      json_summary_path: Website/e2e-stats.json
      browser: ${{ matrix.browser }}
      upload_website_artifact: false
