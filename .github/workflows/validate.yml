name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Conventional commits (release notes / in-app changelog)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/validate-pr-conventional-commits.js

      - name: Unit tests
        run: npm run test:unit

      - name: Validate JavaScript syntax
        run: |
          node --check main.js
          node --check preload.js
          node --check preload-notification.js
          node --check script.js
          node --check scripts/build-icon.js
          node --check scripts/clean-dist.js
          node --check scripts/validate-config.js
          node --check scripts/generate-nsis-installer-assets.js
          node --check scripts/commit-conventions.js
          node --check scripts/validate-pr-conventional-commits.js

      - name: Build icon assets
        run: node scripts/build-icon.js

      - name: Generate NSIS installer bitmaps
        run: node scripts/generate-nsis-installer-assets.js
