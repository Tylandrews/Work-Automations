name: Release Electron App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (example: v3.0.2)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            echo "checkout_ref=refs/tags/${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version and tag
        shell: bash
        run: node scripts/validate-release-version.js "${{ steps.ref.outputs.release_tag }}"

      - name: Generate changelog and release notes from git
        shell: bash
        run: node scripts/generate-release-changelog.js "${{ steps.ref.outputs.release_tag }}"

      - name: Create supabaseConfig.js from secrets
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLLOG_MASTER_KEY: ${{ secrets.CALLLOG_MASTER_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SUPABASE_URL) -or [string]::IsNullOrWhiteSpace($env:SUPABASE_ANON_KEY)) {
            throw "Missing required repository secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
          }
          if ([string]::IsNullOrWhiteSpace($env:CALLLOG_MASTER_KEY)) {
            throw "Missing required repository secret: CALLLOG_MASTER_KEY (needed for encrypted PII and saving calls)"
          }
          @"
          window.supabaseConfig = {
            SUPABASE_URL: '$env:SUPABASE_URL',
            SUPABASE_ANON_KEY: '$env:SUPABASE_ANON_KEY',
            CALLLOG_MASTER_KEY: '$env:CALLLOG_MASTER_KEY'
          }
          "@ | Set-Content -Path "supabaseConfig.js" -Encoding UTF8

      - name: Build Windows artifacts
        run: npm run build-win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.release_tag }}
          generate_release_notes: false
          body_path: release-notes.md
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

      - name: Commit changelog to main
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -f -B main origin/main
          node scripts/generate-release-changelog.js "$RELEASE_TAG"
          if git diff --quiet CHANGELOG.md changelog-bundled.json; then
            echo "No changelog updates to commit."
            exit 0
          fi
          git add CHANGELOG.md changelog-bundled.json
          git commit -m "chore: update changelog for ${RELEASE_TAG}"
          git push origin main
