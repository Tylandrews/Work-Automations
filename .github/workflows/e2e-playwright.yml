# Reusable Playwright E2E against the repo-root static server (supabaseConfig.js at root).
# Callers must pass secrets: inherit and supply repository secrets:
# SUPABASE_URL, SUPABASE_ANON_KEY, CALLLOG_TEST_EMAIL, CALLLOG_TEST_PASSWORD
name: E2E Playwright

on:
  workflow_call:
    inputs:
      json_summary_path:
        description: Path relative to repo root for --json-summary (e.g. Website/e2e-stats.json)
        required: true
        type: string
      browser:
        description: Playwright browser (chromium, firefox, webkit)
        required: false
        type: string
        default: chromium
      upload_website_artifact:
        description: If true, upload Website/ as artifact website-for-pages for deploy jobs
        required: false
        type: boolean
        default: false
      e2e_workers:
        description: Parallel TC*.py processes (1 avoids races when all tests share one Supabase user)
        required: false
        type: number
        default: 1

permissions:
  contents: read
  # upload-artifact for Website when upload_website_artifact is true
  actions: write

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Playwright
        run: |
          pip install -r e2e/requirements-ci.txt
          playwright install chromium firefox

      - name: Require E2E secrets and run suite
        env:
          CALLLOG_TEST_EMAIL: ${{ secrets.CALLLOG_TEST_EMAIL }}
          CALLLOG_TEST_PASSWORD: ${{ secrets.CALLLOG_TEST_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLLOG_TEST_BASE_URL: http://localhost:4173
          CALLLOG_TEST_BROWSER: ${{ inputs.browser }}
          CALLLOG_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          E2E_JSON_SUMMARY: ${{ inputs.json_summary_path }}
          E2E_PARALLEL_WORKERS: ${{ inputs.e2e_workers }}
          E2E_EVENT_NAME: ${{ github.event_name }}
          E2E_PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SUPABASE_URL:-}" ] && missing="$missing SUPABASE_URL"
          [ -z "${SUPABASE_ANON_KEY:-}" ] && missing="$missing SUPABASE_ANON_KEY"
          [ -z "${CALLLOG_TEST_EMAIL:-}" ] && missing="$missing CALLLOG_TEST_EMAIL"
          [ -z "${CALLLOG_TEST_PASSWORD:-}" ] && missing="$missing CALLLOG_TEST_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::E2E secrets are empty in this job (not the same as missing from Settings):$missing"
            echo ""
            echo "Your repository secrets can still be unset HERE because of GitHub rules:"
            echo "  1) Pull request from a FORK — base repo secrets are never passed (by design). Use a branch on ${GITHUB_REPOSITORY}, or run E2E after merge to main."
            if [ "${E2E_EVENT_NAME:-}" = "pull_request" ] && [ -n "${E2E_PR_HEAD_REPO:-}" ] && [ "${E2E_PR_HEAD_REPO}" != "${GITHUB_REPOSITORY}" ]; then
              echo "::notice::This run is pull_request from fork head repo '${E2E_PR_HEAD_REPO}' (base '${GITHUB_REPOSITORY}'). Repository secrets are unavailable."
            fi
            echo "  2) Organization secrets — allow this repository on the org secret."
            echo "  3) Dependabot events use dependabot secrets, not normal repo secrets, unless you configure otherwise."
            echo ""
            echo "Configure under Settings → Secrets and variables → Actions (repository secrets)."
            exit 1
          fi
          python e2e/run_github_actions_e2e.py

      - name: Upload Website artifact for Pages deploy
        if: ${{ inputs.upload_website_artifact == true }}
        uses: actions/upload-artifact@v4
        with:
          name: website-for-pages
          path: Website
