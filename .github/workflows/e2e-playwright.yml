# Reusable Playwright E2E against the repo-root static server (supabaseConfig.js at root).
# Callers must pass secrets: inherit and supply repository secrets:
# SUPABASE_URL, SUPABASE_ANON_KEY, CALLLOG_TEST_EMAIL, CALLLOG_TEST_PASSWORD
name: E2E Playwright

on:
  workflow_call:
    inputs:
      json_summary_path:
        description: Path relative to repo root for --json-summary (e.g. Website/e2e-stats.json)
        required: true
        type: string
      browser:
        description: Playwright browser (chromium, firefox, webkit)
        required: false
        type: string
        default: chromium
      upload_website_artifact:
        description: If true, upload Website/ as artifact website-for-pages for deploy jobs
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  # upload-artifact for Website when upload_website_artifact is true
  actions: write

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Playwright
        run: |
          pip install -r e2e/requirements-ci.txt
          playwright install chromium firefox

      - name: Require E2E secrets and run suite
        env:
          CALLLOG_TEST_EMAIL: ${{ secrets.CALLLOG_TEST_EMAIL }}
          CALLLOG_TEST_PASSWORD: ${{ secrets.CALLLOG_TEST_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLLOG_TEST_BASE_URL: http://localhost:4173
          CALLLOG_TEST_BROWSER: ${{ inputs.browser }}
          CALLLOG_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SUPABASE_URL:-}" ] && missing="$missing SUPABASE_URL"
          [ -z "${SUPABASE_ANON_KEY:-}" ] && missing="$missing SUPABASE_ANON_KEY"
          [ -z "${CALLLOG_TEST_EMAIL:-}" ] && missing="$missing CALLLOG_TEST_EMAIL"
          [ -z "${CALLLOG_TEST_PASSWORD:-}" ] && missing="$missing CALLLOG_TEST_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repository secrets (configure under Settings → Secrets and variables → Actions):$missing"
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import pathlib

          cfg = {
              "SUPABASE_URL": os.environ["SUPABASE_URL"],
              "SUPABASE_ANON_KEY": os.environ["SUPABASE_ANON_KEY"],
          }
          pathlib.Path("supabaseConfig.js").write_text(
              "window.supabaseConfig = " + json.dumps(cfg, indent=2) + ";\n",
              encoding="utf-8",
          )
          PY
          python e2e/run_e2e_full.py --no-open-report --static-report --headless -- \
            --json-summary "${{ inputs.json_summary_path }}" --workers 6

      - name: Upload Website artifact for Pages deploy
        if: ${{ inputs.upload_website_artifact == true }}
        uses: actions/upload-artifact@v4
        with:
          name: website-for-pages
          path: Website
