<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
            background: transparent;
            overflow: hidden;
        }
        .notification-card {
            width: 100%;
            min-height: 72px;
            background: #2f3136;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            display: flex;
            align-items: stretch;
            cursor: pointer;
            transition: background 0.15s ease;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .notification-card:hover {
            background: #36393f;
        }
        .accent {
            width: 4px;
            background: #5865f2;
            border-radius: 8px 0 0 8px;
            flex-shrink: 0;
        }
        .content {
            flex: 1;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            min-width: 0;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .body {
            font-size: 13px;
            color: #b9bbbe;
            line-height: 1.35;
        }
        .icon-wrap {
            width: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 4px;
        }
        .icon-wrap svg {
            width: 24px;
            height: 24px;
            color: #5865f2;
        }
    </style>
</head>
<body>
    <div class="notification-card" id="card">
        <div class="accent"></div>
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </div>
        <div class="content">
            <div class="title" id="title">IT Support Call Logger</div>
            <div class="body" id="body"></div>
        </div>
    </div>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title') || 'IT Support Call Logger';
            const body = params.get('body') || '';
            document.getElementById('title').textContent = title;
            document.getElementById('body').textContent = body;
            document.getElementById('card').addEventListener('click', function() {
                if (typeof window.notificationClicked === 'function') window.notificationClicked();
            });
        })();
    </script>
</body>
</html>
